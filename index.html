<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Cyclic Peptide Library Builder</title>

  <!-- stlite styles -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.css"
  />

  <style>
    /* Make the stlite root fill the full viewport */
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #root      { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- stlite runtime -->
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.js"></script>

  <script>
    stlite.mount(
      {
        // Python packages to install via micropip before the app starts
        requirements: [
          "matplotlib",
          "plotly",
          "scipy",
          "tqdm"
        ],

        // Entry-point app script
        entrypoint: "streamlit_app.py",

        // Files to expose in the browser virtual filesystem
        files: {
          "streamlit_app.py":    { url: "streamlit_app.py"    },
          "peptide_selection.py":{ url: "peptide_selection.py" },
          "peptide_logo.svg":    { url: "peptide_logo.svg"     },
          // Streamlit theme config
          ".streamlit/config.toml": {
            data:
              '[theme]\n' +
              'base = "dark"\n' +
              'primaryColor = "#60a5fa"\n',
          },
        },
      },
      document.getElementById("root")
    );
  </script>
</body>
</html>
